<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a"/>
      <stop offset="50%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <radialGradient id="snakeHead" cx="30%" cy="30%">
      <stop offset="0%" style="stop-color:#70ffff"/>
      <stop offset="50%" style="stop-color:#00ffff"/>
      <stop offset="100%" style="stop-color:#0080ff"/>
    </radialGradient>
    <radialGradient id="snakeBody" cx="30%" cy="30%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="40%" style="stop-color:#00ffff"/>
      <stop offset="100%" style="stop-color:#0080aa"/>
    </radialGradient>
    <radialGradient id="gem" cx="30%" cy="30%">
      <stop offset="0%" style="stop-color:#fffacd"/>
      <stop offset="30%" style="stop-color:#ffd700"/>
      <stop offset="70%" style="stop-color:#ff8c00"/>
      <stop offset="100%" style="stop-color:#ff4500"/>
    </radialGradient>
  </defs>
  
  <!-- 背景 -->
  <rect width="512" height="512" fill="url(#bg)" rx="80"/>
  
  <!-- 蛇身 -->
  <circle cx="280" cy="320" r="45" fill="url(#snakeBody)"/>
  <circle cx="340" cy="300" r="42" fill="url(#snakeBody)"/>
  <circle cx="390" cy="260" r="40" fill="url(#snakeBody)"/>
  
  <!-- 蛇頭 -->
  <circle cx="280" cy="200" r="55" fill="url(#snakeHead)"/>
  
  <!-- 眼睛 -->
  <ellipse cx="300" cy="185" rx="12" ry="15" fill="white"/>
  <ellipse cx="320" cy="185" rx="12" ry="15" fill="white"/>
  <circle cx="305" cy="188" r="7" fill="black"/>
  <circle cx="325" cy="188" r="7" fill="black"/>
  
  <!-- 寶石 -->
  <circle cx="150" cy="150" r="50" fill="url(#gem)"/>
  <path d="M120 130 L150 100 L180 130 L150 160 Z" fill="white" opacity="0.4"/>
  
  <!-- 光暈效果 -->
  <circle cx="280" cy="200" r="70" fill="none" stroke="#00ffff" stroke-width="3" opacity="0.5"/>
  <circle cx="150" cy="150" r="65" fill="none" stroke="#ffd700" stroke-width="3" opacity="0.5"/>
</svg>

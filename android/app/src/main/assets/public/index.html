<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <title>華麗貪食蛇 - Deluxe Snake</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            touch-action: none;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .game-container {
            position: relative;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 20px;
            padding: 15px;
            box-shadow: 
                0 0 60px rgba(0, 255, 255, 0.1),
                inset 0 0 60px rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 100%;
            max-width: 600px;
        }

        .game-title {
            text-align: center;
            color: #fff;
            font-size: 1.8em;
            margin-bottom: 10px;
            text-shadow: 
                0 0 10px #00ffff,
                0 0 20px #00ffff,
                0 0 40px #00ffff;
            letter-spacing: 3px;
            font-weight: 300;
        }

        .score-board {
            display: flex;
            justify-content: space-between;
            padding: 10px 15px;
            background: linear-gradient(90deg, rgba(0,255,255,0.1), rgba(255,0,255,0.1));
            border-radius: 10px;
            margin-bottom: 10px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .score-item {
            color: #fff;
            font-size: 0.9em;
        }

        .score-value {
            color: #00ffff;
            font-weight: bold;
            font-size: 1.1em;
            text-shadow: 0 0 10px #00ffff;
        }

        .canvas-container {
            position: relative;
            width: 100%;
            padding-bottom: 100%;
            border-radius: 10px;
            overflow: hidden;
        }

        #gameCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-radius: 10px;
            box-shadow: 
                0 0 30px rgba(0, 255, 255, 0.2),
                inset 0 0 30px rgba(0, 0, 0, 0.5);
            background: radial-gradient(ellipse at center, #0d1117 0%, #000 100%);
        }

        .controls-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
        }

        .d-pad {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 180px;
            height: 180px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
            gap: 5px;
            z-index: 20;
        }

        .d-pad-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(0, 255, 255, 0.3);
            border-radius: 15px;
            color: #00ffff;
            font-size: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            user-select: none;
        }

        .d-pad-btn:active {
            background: rgba(0, 255, 255, 0.3);
            border-color: #00ffff;
            transform: scale(0.95);
        }

        .d-pad-up { grid-column: 2; grid-row: 1; }
        .d-pad-left { grid-column: 1; grid-row: 2; }
        .d-pad-center { grid-column: 2; grid-row: 2; background: rgba(255, 0, 255, 0.2); border-color: rgba(255, 0, 255, 0.5); }
        .d-pad-right { grid-column: 3; grid-row: 2; }
        .d-pad-down { grid-column: 2; grid-row: 3; }

        .game-over-overlay, .start-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.9);
            z-index: 100;
        }

        .start-overlay {
            background: rgba(0, 0, 0, 0.85);
        }

        .modal-content {
            text-align: center;
            background: rgba(0, 0, 0, 0.9);
            padding: 40px;
            border-radius: 20px;
            border: 2px solid #00ffff;
            box-shadow: 
                0 0 50px rgba(0, 255, 255, 0.5),
                inset 0 0 50px rgba(0, 255, 255, 0.1);
            max-width: 90%;
        }

        .game-over-overlay .modal-content {
            border-color: #ff0066;
            box-shadow: 
                0 0 50px rgba(255, 0, 102, 0.5),
                inset 0 0 50px rgba(255, 0, 102, 0.1);
        }

        .start-title, .game-over-title {
            color: #00ffff;
            font-size: 2em;
            margin-bottom: 20px;
            text-shadow: 
                0 0 10px #00ffff,
                0 0 30px #00ffff;
        }

        .game-over-title {
            color: #ff0066;
            text-shadow: 
                0 0 10px #ff0066,
                0 0 20px #ff0066;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .modal-content p {
            color: rgba(255,255,255,0.7);
            margin: 10px 0;
            font-size: 1em;
        }

        .final-score {
            color: #fff;
            font-size: 1.3em;
            margin: 20px 0;
        }

        .start-btn, .restart-btn {
            background: linear-gradient(90deg, #ff00ff, #ff0066);
            border: none;
            padding: 15px 40px;
            font-size: 1.1em;
            color: #fff;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: all 0.3s;
            box-shadow: 0 0 20px rgba(255, 0, 255, 0.5);
            margin-top: 20px;
        }

        .restart-btn {
            background: linear-gradient(90deg, #00ffff, #0080ff);
            color: #000;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.5);
        }

        .start-btn:active, .restart-btn:active {
            transform: scale(0.95);
        }

        .hidden {
            display: none !important;
        }

        .pause-indicator {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #00ffff;
            font-size: 2em;
            text-shadow: 0 0 20px #00ffff;
            z-index: 50;
            display: none;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1 class="game-title">✦ 華麗貪食蛇 ✦</h1>
        
        <div class="score-board">
            <div class="score-item">分數: <span class="score-value" id="score">0</span></div>
            <div class="score-item">最高分: <span class="score-value" id="highScore">0</span></div>
            <div class="score-item">長度: <span class="score-value" id="length">3</span></div>
        </div>

        <div class="canvas-container">
            <canvas id="gameCanvas"></canvas>
            <div class="pause-indicator" id="pauseIndicator">⏸️ 暫停</div>
            
            <div class="d-pad">
                <div class="d-pad-btn d-pad-up" data-dir="up">⬆️</div>
                <div class="d-pad-btn d-pad-left" data-dir="left">⬅️</div>
                <div class="d-pad-btn d-pad-center" id="pauseBtn">⏸️</div>
                <div class="d-pad-btn d-pad-right" data-dir="right">➡️</div>
                <div class="d-pad-btn d-pad-down" data-dir="down">⬇️</div>
            </div>
        </div>
    </div>

    <div class="start-overlay" id="startOverlay">
        <div class="modal-content">
            <div class="start-title">🐍 貪食蛇</div>
            <p>使用方向按鈕控制蛇的移動</p>
            <p>收集閃耀的寶石，變得更長！</p>
            <button class="start-btn" id="startBtn">開始遊戲</button>
        </div>
    </div>

    <div class="game-over-overlay hidden" id="gameOverOverlay">
        <div class="modal-content">
            <div class="game-over-title">遊戲結束</div>
            <div class="final-score">最終分數: <span id="finalScore">0</span></div>
            <button class="restart-btn" id="restartBtn">重新開始</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');
        const highScoreElement = document.getElementById('highScore');
        const lengthElement = document.getElementById('length');
        const finalScoreElement = document.getElementById('finalScore');
        const gameOverOverlay = document.getElementById('gameOverOverlay');
        const startOverlay = document.getElementById('startOverlay');
        const pauseIndicator = document.getElementById('pauseIndicator');
        const pauseBtn = document.getElementById('pauseBtn');

        // 設置畫布大小
        function resizeCanvas() {
            const container = canvas.parentElement;
            canvas.width = container.clientWidth;
            canvas.height = container.clientHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // 遊戲設定
        const gridCount = 20;
        let gridSize;
        let score = 0;
        let highScore = localStorage.getItem('snakeHighScore') || 0;
        highScoreElement.textContent = highScore;

        // 蛇的初始狀態
        let snake = [
            { x: 10, y: 10 },
            { x: 9, y: 10 },
            { x: 8, y: 10 }
        ];

        // 食物位置
        let food = { x: 15, y: 15 };

        // 移動方向
        let dx = 1;
        let dy = 0;
        let nextDx = 1;
        let nextDy = 0;

        // 遊戲狀態
        let gameRunning = false;
        let gamePaused = false;
        let gameLoop;

        // 粒子效果
        let particles = [];
        let colorOffset = 0;

        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.color = color;
                this.size = Math.random() * 4 + 2;
                this.speedX = (Math.random() - 0.5) * 6;
                this.speedY = (Math.random() - 0.5) * 6;
                this.life = 1;
                this.decay = Math.random() * 0.02 + 0.015;
            }

            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                this.speedX *= 0.98;
                this.speedY *= 0.98;
                this.life -= this.decay;
                this.size *= 0.98;
            }

            draw() {
                ctx.save();
                ctx.globalAlpha = this.life;
                ctx.fillStyle = this.color;
                ctx.shadowBlur = 10;
                ctx.shadowColor = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        function createParticles(x, y, color, count = 10) {
            const centerX = x * gridSize + gridSize / 2;
            const centerY = y * gridSize + gridSize / 2;
            for (let i = 0; i < count; i++) {
                particles.push(new Particle(centerX, centerY, color));
            }
        }

        function drawSnake() {
            const total = snake.length;

            for (let i = total - 1; i >= 0; i--) {
                const segment = snake[i];
                const x = segment.x * gridSize;
                const y = segment.y * gridSize;

                if (i === 0) {
                    drawSnakeHead(x, y);
                } else {
                    drawSnakeBody(x, y, i, total);
                }
            }

            drawSnakeEyes(snake[0].x * gridSize, snake[0].y * gridSize);
        }

        function drawSnakeHead(x, y) {
            const centerX = x + gridSize / 2;
            const centerY = y + gridSize / 2;

            const gradient = ctx.createRadialGradient(centerX, centerY, 0, centerX, centerY, gridSize);
            gradient.addColorStop(0, `hsl(${colorOffset}, 100%, 70%)`);
            gradient.addColorStop(0.5, `hsl(${colorOffset}, 100%, 50%)`);
            gradient.addColorStop(1, `hsl(${colorOffset}, 100%, 30%)`);

            ctx.fillStyle = gradient;
            ctx.shadowBlur = 20;
            ctx.shadowColor = `hsl(${colorOffset}, 100%, 50%)`;
            ctx.beginPath();
            ctx.arc(centerX, centerY, gridSize / 2 - 1, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = 'rgba(255, 255, 255, 0.4)';
            ctx.shadowBlur = 0;
            ctx.beginPath();
            ctx.arc(centerX - 3, centerY - 3, gridSize / 5, 0, Math.PI * 2);
            ctx.fill();
        }

        function drawSnakeBody(x, y, index, total) {
            const centerX = x + gridSize / 2;
            const centerY = y + gridSize / 2;
            const size = (gridSize / 2 - 2) * (1 - index / total * 0.3);

            const hue = (colorOffset + index * 3) % 360;
            
            ctx.fillStyle = `hsl(${hue}, 100%, 50%)`;
            ctx.shadowBlur = 15;
            ctx.shadowColor = `hsl(${hue}, 100%, 50%)`;
            ctx.beginPath();
            ctx.arc(centerX, centerY, size, 0, Math.PI * 2);
            ctx.fill();

            const innerGradient = ctx.createRadialGradient(
                centerX - 2, centerY - 2, 0,
                centerX, centerY, size
            );
            innerGradient.addColorStop(0, 'rgba(255, 255, 255, 0.5)');
            innerGradient.addColorStop(0.5, `hsl(${hue}, 100%, 60%)`);
            innerGradient.addColorStop(1, `hsl(${hue}, 100%, 40%)`);

            ctx.fillStyle = innerGradient;
            ctx.shadowBlur = 0;
            ctx.beginPath();
            ctx.arc(centerX, centerY, size * 0.8, 0, Math.PI * 2);
            ctx.fill();

            if (index < total - 1) {
                ctx.strokeStyle = `hsl(${hue}, 100%, 70%)`;
                ctx.lineWidth = 2;
                ctx.shadowBlur = 10;
                ctx.shadowColor = `hsl(${hue}, 100%, 50%)`;
                ctx.beginPath();
                ctx.moveTo(centerX, centerY);
                const nextSeg = snake[index + 1];
                ctx.lineTo(nextSeg.x * gridSize + gridSize / 2, nextSeg.y * gridSize + gridSize / 2);
                ctx.stroke();
            }
        }

        function drawSnakeEyes(x, y) {
            const eyeSize = Math.max(2, gridSize / 8);
            let eyeX1, eyeY1, eyeX2, eyeY2;

            if (dx === 1) {
                eyeX1 = x + gridSize - eyeSize * 2; eyeY1 = y + eyeSize * 2;
                eyeX2 = x + gridSize - eyeSize * 2; eyeY2 = y + gridSize - eyeSize * 2;
            } else if (dx === -1) {
                eyeX1 = x + eyeSize * 2; eyeY1 = y + eyeSize * 2;
                eyeX2 = x + eyeSize * 2; eyeY2 = y + gridSize - eyeSize * 2;
            } else if (dy === -1) {
                eyeX1 = x + eyeSize * 2; eyeY1 = y + eyeSize * 2;
                eyeX2 = x + gridSize - eyeSize * 2; eyeY2 = y + eyeSize * 2;
            } else {
                eyeX1 = x + eyeSize * 2; eyeY1 = y + gridSize - eyeSize * 2;
                eyeX2 = x + gridSize - eyeSize * 2; eyeY2 = y + gridSize - eyeSize * 2;
            }

            ctx.fillStyle = '#fff';
            ctx.shadowBlur = 5;
            ctx.shadowColor = '#fff';
            ctx.beginPath();
            ctx.arc(eyeX1, eyeY1, eyeSize, 0, Math.PI * 2);
            ctx.arc(eyeX2, eyeY2, eyeSize, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = '#000';
            ctx.shadowBlur = 0;
            ctx.beginPath();
            ctx.arc(eyeX1 + dx * eyeSize/2, eyeY1 + dy * eyeSize/2, eyeSize / 2, 0, Math.PI * 2);
            ctx.arc(eyeX2 + dx * eyeSize/2, eyeY2 + dy * eyeSize/2, eyeSize / 2, 0, Math.PI * 2);
            ctx.fill();
        }

        function drawFood() {
            const x = food.x * gridSize + gridSize / 2;
            const y = food.y * gridSize + gridSize / 2;

            const pulseSize = 1 + Math.sin(Date.now() / 200) * 0.2;
            ctx.fillStyle = 'rgba(255, 215, 0, 0.3)';
            ctx.shadowBlur = 30;
            ctx.shadowColor = '#ffd700';
            ctx.beginPath();
            ctx.arc(x, y, (gridSize / 2) * pulseSize + 5, 0, Math.PI * 2);
            ctx.fill();

            const gradient = ctx.createRadialGradient(x - 3, y - 3, 0, x, y, gridSize / 2);
            gradient.addColorStop(0, '#fffacd');
            gradient.addColorStop(0.3, '#ffd700');
            gradient.addColorStop(0.7, '#ff8c00');
            gradient.addColorStop(1, '#ff4500');

            ctx.fillStyle = gradient;
            ctx.shadowBlur = 20;
            ctx.shadowColor = '#ffd700';
            ctx.beginPath();
            ctx.arc(x, y, gridSize / 2 - 2, 0, Math.PI * 2);
            ctx.fill();

            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 2;
            ctx.shadowBlur = 10;
            ctx.shadowColor = '#fff';
            ctx.beginPath();
            for (let i = 0; i < 4; i++) {
                const angle = (i * Math.PI / 2) + Date.now() / 1000;
                const r1 = gridSize / 2 + 8;
                const r2 = gridSize / 2 + 15;
                ctx.moveTo(x + Math.cos(angle) * r1, y + Math.sin(angle) * r1);
                ctx.lineTo(x + Math.cos(angle) * r2, y + Math.sin(angle) * r2);
            }
            ctx.stroke();
        }

        function drawGrid() {
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.03)';
            ctx.lineWidth = 1;
            ctx.shadowBlur = 0;

            for (let i = 0; i <= gridCount; i++) {
                ctx.beginPath();
                ctx.moveTo(i * gridSize, 0);
                ctx.lineTo(i * gridSize, canvas.height);
                ctx.stroke();

                ctx.beginPath();
                ctx.moveTo(0, i * gridSize);
                ctx.lineTo(canvas.width, i * gridSize);
                ctx.stroke();
            }
        }

        function drawParticles() {
            particles = particles.filter(p => p.life > 0);
            particles.forEach(p => {
                p.update();
                p.draw();
            });
        }

        function update() {
            if (gamePaused) return;

            colorOffset = (colorOffset + 2) % 360;

            dx = nextDx;
            dy = nextDy;

            const head = { x: snake[0].x + dx, y: snake[0].y + dy };

            if (head.x < 0 || head.x >= gridCount || head.y < 0 || head.y >= gridCount) {
                gameOver();
                return;
            }

            for (let segment of snake) {
                if (head.x === segment.x && head.y === segment.y) {
                    gameOver();
                    return;
                }
            }

            snake.unshift(head);

            if (head.x === food.x && head.y === food.y) {
                score += 10;
                scoreElement.textContent = score;
                lengthElement.textContent = snake.length;
                
                createParticles(food.x, food.y, '#ffd700', 20);
                createParticles(food.x, food.y, '#ff8c00', 15);
                createParticles(food.x, food.y, '#ff4500', 10);

                generateFood();
            } else {
                snake.pop();
            }
        }

        function generateFood() {
            do {
                food = {
                    x: Math.floor(Math.random() * gridCount),
                    y: Math.floor(Math.random() * gridCount)
                };
            } while (snake.some(segment => segment.x === food.x && segment.y === food.y));
        }

        function draw() {
            gridSize = canvas.width / gridCount;
            
            ctx.fillStyle = 'rgba(13, 17, 23, 0.3)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            drawGrid();
            drawFood();
            drawSnake();
            drawParticles();
        }

        function gameStep() {
            update();
            draw();
        }

        function startGame() {
            startOverlay.classList.add('hidden');
            gameRunning = true;
            gameLoop = setInterval(gameStep, 100);
        }

        function gameOver() {
            gameRunning = false;
            clearInterval(gameLoop);

            if (score > highScore) {
                highScore = score;
                localStorage.setItem('snakeHighScore', highScore);
                highScoreElement.textContent = highScore;
            }

            finalScoreElement.textContent = score;
            gameOverOverlay.classList.remove('hidden');

            for (let segment of snake) {
                createParticles(segment.x, segment.y, `hsl(${Math.random() * 360}, 100%, 50%)`, 5);
            }
        }

        function restartGame() {
            snake = [
                { x: 10, y: 10 },
                { x: 9, y: 10 },
                { x: 8, y: 10 }
            ];
            dx = 1;
            dy = 0;
            nextDx = 1;
            nextDy = 0;
            score = 0;
            particles = [];
            scoreElement.textContent = '0';
            lengthElement.textContent = '3';
            generateFood();
            
            gameOverOverlay.classList.add('hidden');
            gameRunning = true;
            gameLoop = setInterval(gameStep, 100);
        }

        function togglePause() {
            if (!gameRunning) return;
            gamePaused = !gamePaused;
            pauseIndicator.style.display = gamePaused ? 'block' : 'none';
            pauseBtn.textContent = gamePaused ? '▶️' : '⏸️';
        }

        function setDirection(direction) {
            if (!gameRunning || gamePaused) return;
            
            switch(direction) {
                case 'up':
                    if (dy !== 1) { nextDx = 0; nextDy = -1; }
                    break;
                case 'down':
                    if (dy !== -1) { nextDx = 0; nextDy = 1; }
                    break;
                case 'left':
                    if (dx !== 1) { nextDx = -1; nextDy = 0; }
                    break;
                case 'right':
                    if (dx !== -1) { nextDx = 1; nextDy = 0; }
                    break;
            }
        }

        // 觸控控制
        document.querySelectorAll('.d-pad-btn[data-dir]').forEach(btn => {
            btn.addEventListener('touchstart', (e) => {
                e.preventDefault();
                setDirection(btn.dataset.dir);
            });
            btn.addEventListener('click', (e) => {
                setDirection(btn.dataset.dir);
            });
        });

        pauseBtn.addEventListener('touchstart', (e) => {
            e.preventDefault();
            togglePause();
        });
        pauseBtn.addEventListener('click', togglePause);

        document.getElementById('startBtn').addEventListener('click', startGame);
        document.getElementById('restartBtn').addEventListener('click', restartGame);

        // 鍵盤控制（用於桌面測試）
        document.addEventListener('keydown', (e) => {
            if (!gameRunning) return;

            switch(e.key) {
                case 'ArrowUp':
                    setDirection('up');
                    e.preventDefault();
                    break;
                case 'ArrowDown':
                    setDirection('down');
                    e.preventDefault();
                    break;
                case 'ArrowLeft':
                    setDirection('left');
                    e.preventDefault();
                    break;
                case 'ArrowRight':
                    setDirection('right');
                    e.preventDefault();
                    break;
                case ' ':
                    togglePause();
                    e.preventDefault();
                    break;
            }
        });

        // 滑動控制
        let touchStartX = 0;
        let touchStartY = 0;

        canvas.addEventListener('touchstart', (e) => {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        }, { passive: true });

        canvas.addEventListener('touchmove', (e) => {
            if (!gameRunning || gamePaused) return;
            
            const touchEndX = e.touches[0].clientX;
            const touchEndY = e.touches[0].clientY;
            
            const dx = touchEndX - touchStartX;
            const dy = touchEndY - touchStartY;
            
            if (Math.abs(dx) > Math.abs(dy)) {
                if (Math.abs(dx) > 30) {
                    setDirection(dx > 0 ? 'right' : 'left');
                    touchStartX = touchEndX;
                    touchStartY = touchEndY;
                }
            } else {
                if (Math.abs(dy) > 30) {
                    setDirection(dy > 0 ? 'down' : 'up');
                    touchStartX = touchEndX;
                    touchStartY = touchEndY;
                }
            }
        }, { passive: true });

        // 初始繪製
        resizeCanvas();
        draw();
    </script>
</body>
</html>
